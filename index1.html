<style>
/* ================================================================
   DESIGN SYSTEM — VARIABLES
   ================================================================ */
:root {
    --bg-0: #050810;
    --bg-1: #0a0f1c;
    --bg-2: #0f1629;
    --bg-3: #151e35;
    --bg-4: #1a2540;
    --bg-card: rgba(15, 22, 41, 0.7);
    --bg-card-solid: #111a30;
    --bg-glass: rgba(15, 22, 41, 0.6);

    --text-0: #ffffff;
    --text-1: #e2e8f0;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --text-4: #475569;

    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --accent-dark: #2563eb;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 50%, #8b5cf6 100%);
    --gradient-subtle: linear-gradient(135deg, rgba(59,130,246,0.12) 0%, rgba(6,182,212,0.08) 100%);
    --gradient-border: linear-gradient(135deg, rgba(59,130,246,0.4), rgba(6,182,212,0.2), rgba(139,92,246,0.4));

    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(59,130,246,0.3);
    --border-active: rgba(59,130,246,0.5);

    --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
    --shadow-xl: 0 24px 64px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 60px rgba(59,130,246,0.08);
    --shadow-glow-hover: 0 0 80px rgba(59,130,246,0.15);

    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --max-w: 1240px;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ================================================================
   RESET & FOUNDATIONS
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 90px; }
body {
    font-family: var(--font); background: var(--bg-0); color: var(--text-1);
    line-height: 1.7; font-size: 16px; -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale; overflow-x: hidden;
    text-rendering: optimizeLegibility;
}

::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-1); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { font-family: var(--font); }

.container { max-width: var(--max-w); margin: 0 auto; padding: 0 32px; }

/* ================================================================
   ANIMATIONS
   ================================================================ */
@keyframes fadeUp { from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)} }
@keyframes fadeLeft { from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)} }
@keyframes fadeRight { from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)} }
@keyframes scaleIn { from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(59,130,246,0.15)}50%{box-shadow:0 0 40px rgba(59,130,246,0.25)} }
@keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }
@keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-20px) rotate(2deg)}50%{transform:translateY(-10px) rotate(-1deg)}75%{transform:translateY(-25px) rotate(1deg)} }
@keyframes lineGrow { from{transform:scaleX(0)}to{transform:scaleX(1)} }
@keyframes typewriter { from{width:0}to{width:100%} }
@keyframes blink { 0%,50%{border-color:var(--accent)}51%,100%{border-color:transparent} }
@keyframes orbitSlow { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }
@keyframes particleFloat {
    0%,100%{transform:translate(0,0) scale(1);opacity:0.3}
    25%{transform:translate(100px,-80px) scale(1.2);opacity:0.6}
    50%{transform:translate(-50px,-150px) scale(0.8);opacity:0.4}
    75%{transform:translate(80px,-100px) scale(1.1);opacity:0.5}
}

.anim { opacity:0; transform:translateY(40px); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
.anim.v { opacity:1; transform:translateY(0); }
.anim-left { opacity:0; transform:translateX(-40px); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
.anim-left.v { opacity:1; transform:translateX(0); }
.anim-right { opacity:0; transform:translateX(40px); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
.anim-right.v { opacity:1; transform:translateX(0); }
.anim-scale { opacity:0; transform:scale(0.92); transition: opacity 0.7s ease, transform 0.7s ease; }
.anim-scale.v { opacity:1; transform:scale(1); }

/* ================================================================
   SECTION SYSTEM
   ================================================================ */
.section { padding: 130px 0; position: relative; }
.section-dark { background: var(--bg-1); }
.section-header { text-align: center; margin-bottom: 72px; position: relative; z-index: 2; }
.section-overline {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--accent); text-transform: uppercase; letter-spacing: 4px;
    margin-bottom: 20px; position: relative;
}
.section-overline::before, .section-overline::after {
    content:''; width: 32px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
}
.section-overline::after { background: linear-gradient(90deg, var(--accent), transparent); }
.section-title {
    font-size: clamp(34px,5vw,52px); font-weight: 800; line-height: 1.15;
    letter-spacing: -1.5px; margin-bottom: 18px;
    background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
}
.section-desc {
    font-size: 17px; color: var(--text-2); max-width: 560px; margin: 0 auto; line-height: 1.8;
}

/* Decorative elements */
.section-glow {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    filter: blur(120px); pointer-events: none; z-index: 0;
}

/* ================================================================
   NAVBAR — Ultra Premium
   ================================================================ */
.navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 20px 0; transition: all var(--transition);
}
.navbar.scrolled {
    padding: 8px 0;
    background: rgba(5,8,16,0.85);
    backdrop-filter: blur(30px) saturate(180%);
    border-bottom: 1px solid var(--border);
}
.nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: var(--max-w); margin: 0 auto; padding: 0 32px;
}

/* Logo */
.nav-logo { display: flex; align-items: center; gap: 14px; z-index: 1001; }
.logo-mark {
    width: 44px; height: 44px; background: var(--gradient);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 800; font-size: 16px; color: #fff;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 16px rgba(59,130,246,0.25);
    transition: all var(--transition-fast);
}
.logo-mark::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
}
.nav-logo:hover .logo-mark { transform: scale(1.05); box-shadow: 0 6px 24px rgba(59,130,246,0.35); }
.logo-text { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; color: var(--text-0); }
.logo-dot { color: var(--accent); }

/* Nav Links */
.nav-menu { display: flex; align-items: center; gap: 4px; }
.nav-link {
    padding: 10px 18px; color: var(--text-2); font-size: 14px;
    font-weight: 500; border-radius: 10px; transition: all var(--transition-fast);
    position: relative; letter-spacing: 0.2px;
}
.nav-link::after {
    content:''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 0; height: 2px; background: var(--accent); border-radius: 2px;
    transition: width var(--transition-fast);
}
.nav-link:hover { color: var(--text-0); }
.nav-link:hover::after { width: 20px; }
.nav-cta-wrap { margin-left: 20px; }
.nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px; font-size: 14px; font-weight: 600; color: #fff;
    background: var(--accent); border-radius: 10px;
    transition: all var(--transition-fast);
    box-shadow: 0 4px 16px rgba(59,130,246,0.25);
    border: 1px solid rgba(59,130,246,0.5);
}
.nav-cta:hover {
    background: var(--accent-dark); transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(59,130,246,0.35);
}

/* Mobile Toggle */
.nav-toggle {
    display: none; width: 44px; height: 44px;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; position: relative;
    z-index: 1001; align-items: center; justify-content: center;
    flex-direction: column; gap: 5px; transition: all var(--transition-fast);
}
.nav-toggle span {
    width: 18px; height: 1.5px; background: var(--text-0); border-radius: 2px;
    transition: all 0.3s ease; display: block;
}
.nav-toggle.on span:nth-child(1) { transform: rotate(45deg) translate(4.5px,4.5px); }
.nav-toggle.on span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-toggle.on span:nth-child(3) { transform: rotate(-45deg) translate(4.5px,-4.5px); }

/* Mobile Overlay */
.nav-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(5,8,16,0.5); backdrop-filter: blur(8px);
    z-index: 999; opacity: 0; transition: opacity 0.3s ease;
}
.nav-overlay.show { display: block; opacity: 1; }

@media(max-width:900px) {
    .nav-toggle { display: flex; }
    .nav-menu {
        position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
        background: var(--bg-2); flex-direction: column; align-items: stretch;
        padding: 100px 28px 40px; gap: 4px; z-index: 1000;
        transition: right 0.4s cubic-bezier(0.16,1,0.3,1);
        border-left: 1px solid var(--border);
        box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    }
    .nav-menu.open { right: 0; }
    .nav-link { padding: 16px 20px; font-size: 16px; border-radius: 12px; }
    .nav-link:hover { background: var(--bg-3); }
    .nav-link::after { display: none; }
    .nav-cta-wrap { margin-left: 0; margin-top: 16px; }
    .nav-cta { width: 100%; justify-content: center; padding: 14px; font-size: 15px; }
}

/* ================================================================
   HERO — Ultra Premium
   ================================================================ */
.hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 120px 0 80px; position: relative; overflow: hidden;
}

/* Hero Background Effects */
.hero-particles {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.particle {
    position: absolute; width: 4px; height: 4px;
    background: var(--accent); border-radius: 50%; opacity: 0.2;
}
.particle:nth-child(1) { top:15%; left:10%; animation: particleFloat 18s infinite; }
.particle:nth-child(2) { top:25%; left:80%; animation: particleFloat 22s infinite 3s; width:3px; height:3px; }
.particle:nth-child(3) { top:60%; left:20%; animation: particleFloat 20s infinite 6s; }
.particle:nth-child(4) { top:70%; left:75%; animation: particleFloat 24s infinite 2s; width:5px; height:5px; }
.particle:nth-child(5) { top:40%; left:50%; animation: particleFloat 19s infinite 8s; width:3px; height:3px; }
.particle:nth-child(6) { top:80%; left:40%; animation: particleFloat 21s infinite 4s; }

.hero-gradient-orb {
    position: absolute; border-radius: 50%; filter: blur(100px); pointer-events: none;
}
.hero-orb-1 {
    top: -10%; right: -5%; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
    animation: float 25s ease-in-out infinite;
}
.hero-orb-2 {
    bottom: -15%; left: -10%; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,92,246,0.06), transparent 70%);
    animation: float 30s ease-in-out infinite reverse;
}
.hero-orb-3 {
    top: 30%; left: 40%; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.04), transparent 70%);
    animation: float 20s ease-in-out infinite 5s;
}

.hero-grid-bg {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(59,130,246,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.018) 1px, transparent 1px);
    background-size: 70px 70px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
}

/* Radial line decoration */
.hero-radial {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 900px; height: 900px; border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.04);
    pointer-events: none;
}
.hero-radial::before {
    content:''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px; border-radius: 50%;
    border: 1px solid rgba(59,130,246,0.03);
}

.hero-inner {
    position: relative; z-index: 2;
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: center;
}

/* Hero Content */
.hero-content { animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) forwards; }

.hero-status {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 10px 22px; background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 100px; font-size: 13px; font-weight: 500;
    color: var(--text-2); margin-bottom: 32px;
    animation: fadeDown 0.8s ease 0.3s both;
}
.status-dot {
    width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(34,197,94,0.4);
}
.status-text { letter-spacing: 0.5px; }

.hero-intro {
    font-family: var(--mono); font-size: 15px; font-weight: 500;
    color: var(--accent); margin-bottom: 16px; letter-spacing: 1px;
    animation: fadeUp 0.8s ease 0.4s both;
}

.hero-name {
    font-size: clamp(44px,7vw,76px); font-weight: 900;
    line-height: 1.05; letter-spacing: -3px; margin-bottom: 12px;
    animation: fadeUp 0.8s ease 0.5s both;
}
.hero-name-gradient {
    background: linear-gradient(135deg, #fff 0%, #e2e8f0 50%, #94a3b8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
}

.hero-title-wrap {
    margin-bottom: 28px; animation: fadeUp 0.8s ease 0.6s both;
}
.hero-title {
    font-size: clamp(24px,3.8vw,38px); font-weight: 700; line-height: 1.2;
    background: var(--gradient); -webkit-background-clip: text;
    background-clip: text; color: transparent; letter-spacing: -1px;
}

.hero-desc {
    font-size: 17px; color: var(--text-2); max-width: 500px;
    margin-bottom: 44px; line-height: 1.85; animation: fadeUp 0.8s ease 0.7s both;
}

.hero-actions {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 44px;
    animation: fadeUp 0.8s ease 0.8s both;
}

/* Buttons */
.btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 30px; font-size: 15px; font-weight: 600;
    border-radius: 12px; border: none; cursor: pointer;
    transition: all var(--transition-fast); font-family: var(--font);
    letter-spacing: 0.3px; position: relative; overflow: hidden;
}
.btn svg { width: 18px; height: 18px; transition: transform var(--transition-fast); }
.btn:hover svg { transform: translateX(3px); }

.btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1px solid rgba(96,165,250,0.3);
}
.btn-primary::before {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0; transition: opacity var(--transition-fast);
}
.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-primary:hover::before { opacity: 1; }

.btn-ghost {
    background: var(--bg-3); color: var(--text-0);
    border: 1px solid var(--border);
}
.btn-ghost:hover {
    background: var(--bg-4); border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Social Links */
.hero-socials {
    display: flex; gap: 12px;
    animation: fadeUp 0.8s ease 0.9s both;
}
.social-btn {
    width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-2); transition: all var(--transition-fast);
}
.social-btn svg { width: 20px; height: 20px; }
.social-btn:hover {
    background: var(--accent); border-color: var(--accent);
    color: #fff; transform: translateY(-4px) scale(1.05);
    box-shadow: 0 8px 24px rgba(59,130,246,0.3);
}

/* Hero Code Window */
.hero-visual {
    animation: fadeRight 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    perspective: 1000px;
}
.code-window {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    box-shadow: var(--shadow-xl), var(--shadow-glow);
    transform: rotateY(-2deg) rotateX(1deg);
    transition: transform var(--transition);
    position: relative;
}
.code-window::before {
    content:''; position: absolute; inset: -1px;
    background: var(--gradient-border); border-radius: 20px;
    z-index: -1; opacity: 0.3;
}
.code-window:hover { transform: rotateY(0deg) rotateX(0deg); }

.code-topbar {
    display: flex; align-items: center; padding: 16px 20px;
    background: var(--bg-3); border-bottom: 1px solid var(--border);
}
.code-dots { display: flex; gap: 7px; }
.code-dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }

.code-tabs {
    display: flex; margin-left: 20px; gap: 0;
}
.code-tab {
    padding: 6px 16px; font-family: var(--mono); font-size: 12px;
    color: var(--text-3); border-bottom: 2px solid transparent;
    transition: all var(--transition-fast);
}
.code-tab.active { color: var(--text-1); border-color: var(--accent); background: rgba(59,130,246,0.05); }

.code-body {
    padding: 24px; font-family: var(--mono); font-size: 13.5px; line-height: 2;
    counter-reset: line;
}
.code-line { display: flex; gap: 20px; }
.code-ln {
    color: var(--text-4); user-select: none; min-width: 24px;
    text-align: right; font-size: 12px; padding-top: 1px;
}
.code-ct { color: var(--text-2); white-space: pre; }
.c-kw { color: #c792ea; font-weight: 500; }
.c-cls { color: #ffcb6b; }
.c-str { color: #c3e88d; }
.c-fn { color: #82aaff; }
.c-cmt { color: #546e7a; font-style: italic; }
.c-ann { color: #f78c6c; }
.c-num { color: #f78c6c; }
.c-op { color: #89ddff; }

/* Floating badge on code window */
.code-badge {
    position: absolute; bottom: -16px; right: 24px;
    padding: 8px 20px; background: var(--accent);
    border-radius: 100px; font-size: 12px; font-weight: 700;
    color: #fff; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    animation: glow 3s ease-in-out infinite;
}

@media(max-width:1024px) {
    .hero-inner { grid-template-columns: 1fr; gap: 60px; text-align: center; }
    .hero-desc { margin-left: auto; margin-right: auto; }
    .hero-actions, .hero-socials { justify-content: center; }
    .hero-visual { display: flex; justify-content: center; order: -1; }
    .code-window { transform: none; max-width: 500px; }
}
@media(max-width:640px) {
    .hero { min-height: auto; padding: 90px 0 60px; }
    .hero-actions { flex-direction: column; width: 100%; }
    .btn { width: 100%; justify-content: center; }
    .code-body { font-size: 11.5px; padding: 16px; overflow-x: auto; }
}

/* ================================================================
   ABOUT SECTION
   ================================================================ */
.about-grid {
    display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 80px; align-items: center;
}

/* Stats Visual */
.about-visual { position: relative; }
.about-frame { position: relative; }
.about-frame::before {
    content:''; position: absolute; inset: -2px;
    background: var(--gradient-border); border-radius: 24px; z-index: 0; opacity: 0.3;
}
.about-card {
    position: relative; z-index: 1; background: var(--bg-2);
    border-radius: 22px; padding: 40px; border: 1px solid var(--border);
}
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.stat-item {
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 20px; text-align: center;
    transition: all var(--transition);
    position: relative; overflow: hidden;
}
.stat-item::before {
    content:''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gradient); transform: scaleX(0);
    transition: transform var(--transition); transform-origin: left;
}
.stat-item:hover { border-color: var(--border-hover); transform: translateY(-4px); }
.stat-item:hover::before { transform: scaleX(1); }
.stat-val {
    font-size: 38px; font-weight: 800; letter-spacing: -1px;
    background: var(--gradient); -webkit-background-clip: text;
    background-clip: text; color: transparent; margin-bottom: 6px;
}
.stat-label { font-size: 13px; color: var(--text-3); font-weight: 500; letter-spacing: 0.5px; }

/* About Content */
.about-content {}
.about-label {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--accent); text-transform: uppercase; letter-spacing: 3px;
    margin-bottom: 20px;
}
.about-content h2 {
    font-size: clamp(28px,4vw,42px); font-weight: 800; margin-bottom: 28px;
    line-height: 1.2; letter-spacing: -1px;
    background: linear-gradient(135deg, #fff, #94a3b8);
    -webkit-background-clip: text; background-clip: text; color: transparent;
}
.about-p {
    color: var(--text-2); margin-bottom: 20px; font-size: 15.5px; line-height: 1.85;
}
.about-highlights { margin-top: 32px; }
.hl {
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px;
    color: var(--text-2); font-size: 15px; line-height: 1.7;
    transition: all var(--transition-fast);
}
.hl:hover { color: var(--text-1); transform: translateX(6px); }
.hl-dot {
    flex-shrink: 0; width: 24px; height: 24px; margin-top: 2px;
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    color: var(--accent); transition: all var(--transition-fast);
}
.hl:hover .hl-dot { background: var(--accent); color: #fff; }
.hl-dot svg { width: 12px; height: 12px; }

@media(max-width:1024px) {
    .about-grid { grid-template-columns: 1fr; gap: 50px; }
    .about-visual { order: -1; max-width: 500px; margin: 0 auto; }
}

/* ================================================================
   SKILLS
   ================================================================ */
.skills-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
}
.skill-card {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px; transition: all var(--transition);
    position: relative; overflow: hidden;
}
.skill-card::before {
    content:''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gradient); opacity: 0; transition: opacity var(--transition);
}
.skill-card::after {
    content:''; position: absolute; inset: 0;
    background: var(--gradient-subtle); opacity: 0;
    transition: opacity var(--transition);
}
.skill-card:hover {
    border-color: var(--border-hover); transform: translateY(-6px);
    box-shadow: var(--shadow-glow-hover);
}
.skill-card:hover::before { opacity: 1; }
.skill-card:hover::after { opacity: 1; }

.skill-card-inner { position: relative; z-index: 1; }

.skill-icon-wrap {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--gradient); display: flex;
    align-items: center; justify-content: center; margin-bottom: 22px;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 16px rgba(59,130,246,0.2);
}
.skill-icon-wrap::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
}
.skill-icon-wrap svg { width: 26px; height: 26px; color: #fff; position: relative; z-index: 1; }
.skill-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; letter-spacing: -0.3px; }
.skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.skill-tag {
    padding: 7px 14px; background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-2);
    transition: all var(--transition-fast); cursor: default;
}
.skill-tag:hover {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3);
    color: var(--accent-light);
}

@media(max-width:900px) { .skills-grid { grid-template-columns: repeat(2, 1fr); } }
@media(max-width:600px) { .skills-grid { grid-template-columns: 1fr; } }

/* ================================================================
   PROJECTS
   ================================================================ */
.projects-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px;
}
.proj-card {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 20px; transition: all var(--transition);
    position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.proj-card::before {
    content:''; position: absolute; inset: 0;
    background: var(--gradient-subtle); opacity: 0;
    transition: opacity var(--transition);
}
.proj-card:hover {
    border-color: var(--border-hover); transform: translateY(-8px);
    box-shadow: var(--shadow-lg), var(--shadow-glow-hover);
}
.proj-card:hover::before { opacity: 1; }

.proj-header { padding: 36px 32px 0; position: relative; z-index: 1; }
.proj-meta {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px;
}
.proj-icon {
    width: 60px; height: 60px; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition-fast);
}
.proj-card:hover .proj-icon { background: var(--gradient); border-color: transparent; }
.proj-icon svg { width: 28px; height: 28px; color: var(--accent); transition: color var(--transition-fast); }
.proj-card:hover .proj-icon svg { color: #fff; }

.proj-links-top { display: flex; gap: 8px; }
.proj-link-icon {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    background: var(--bg-3); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-3); transition: all var(--transition-fast);
}
.proj-link-icon:hover { color: var(--text-0); border-color: var(--border-hover); background: var(--bg-4); }
.proj-link-icon svg { width: 18px; height: 18px; }

.proj-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
.proj-desc {
    color: var(--text-2); font-size: 14.5px; line-height: 1.75;
    margin-bottom: 24px;
}
.proj-tech-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.proj-tech-tag {
    padding: 5px 12px; background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 6px; font-family: var(--mono); font-size: 11.5px;
    font-weight: 500; color: var(--accent-light);
}

.proj-footer {
    padding: 24px 32px 32px; margin-top: auto;
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
}
.proj-link-row { display: flex; gap: 20px; }
.proj-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-2); font-size: 14px; font-weight: 500;
    transition: all var(--transition-fast);
}
.proj-link svg { width: 16px; height: 16px; }
.proj-link:hover { color: var(--accent-light); }

@media(max-width:768px) {
    .projects-grid { grid-template-columns: 1fr; }
    .proj-header, .proj-footer { padding-left: 24px; padding-right: 24px; }
}

/* ================================================================
   EXPERIENCE TIMELINE
   ================================================================ */
.timeline { position: relative; max-width: 800px; margin: 0 auto; }
.timeline-line {
    position: absolute; left: 28px; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom, var(--accent), var(--border), transparent);
}
.tl-item { position: relative; padding-left: 76px; padding-bottom: 50px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-marker {
    position: absolute; left: 16px; top: 6px; width: 26px; height: 26px;
    border-radius: 50%; z-index: 1; background: var(--bg-0);
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px rgba(59,130,246,0.2);
    transition: all var(--transition-fast);
}
.tl-marker::after {
    content:''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
}
.tl-item:hover .tl-marker {
    background: var(--accent); transform: scale(1.15);
    box-shadow: 0 0 30px rgba(59,130,246,0.4);
}

.tl-card {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px; transition: all var(--transition);
    position: relative; overflow: hidden;
}
.tl-card::before {
    content:''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--gradient); opacity: 0; transition: opacity var(--transition);
}
.tl-card:hover {
    border-color: var(--border-hover); transform: translateX(8px);
    box-shadow: var(--shadow-glow);
}
.tl-card:hover::before { opacity: 1; }

.tl-date {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--accent); margin-bottom: 12px;
    padding: 5px 14px; background: rgba(59,130,246,0.08);
    border-radius: 6px; border: 1px solid rgba(59,130,246,0.15);
}
.tl-date svg { width: 13px; height: 13px; }
.tl-role { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
.tl-company { font-size: 14px; color: var(--text-3); margin-bottom: 18px; font-weight: 500; }
.tl-details li {
    position: relative; padding-left: 20px; margin-bottom: 10px;
    color: var(--text-2); font-size: 14.5px; line-height: 1.7;
}
.tl-details li::before { content:'▸'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

@media(max-width:640px) {
    .timeline-line { left: 18px; }
    .tl-item { padding-left: 56px; }
    .tl-marker { left: 6px; width: 24px; height: 24px; }
    .tl-card { padding: 24px; }
}

/* ================================================================
   EDUCATION
   ================================================================ */
.edu-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 22px; max-width: 1100px; margin: 0 auto;
}
.edu-card {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 24px; text-align: center;
    position: relative; overflow: hidden; transition: all var(--transition);
}
.edu-card::before {
    content:''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--gradient); transform: scaleX(0);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1); transform-origin: left;
}
.edu-card:hover {
    transform: translateY(-6px); border-color: var(--border-hover);
    box-shadow: var(--shadow-glow-hover);
}
.edu-card:hover::before { transform: scaleX(1); }

.edu-icon-wrap {
    width: 52px; height: 52px; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; transition: all var(--transition-fast);
}
.edu-card:hover .edu-icon-wrap { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); }
.edu-icon-wrap svg { width: 24px; height: 24px; color: var(--accent); }
.edu-degree { font-size: 16px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.edu-period { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-bottom: 18px; letter-spacing: 0.5px; }

.edu-score-wrap { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
.edu-score {
    font-size: 36px; font-weight: 900; letter-spacing: -1px;
    background: var(--gradient); -webkit-background-clip: text;
    background-clip: text; color: transparent;
}
.edu-pct { font-size: 16px; color: var(--text-3); font-weight: 600; }

/* Progress bar under score */
.edu-bar {
    margin-top: 16px; height: 4px; background: var(--bg-3);
    border-radius: 4px; overflow: hidden;
}
.edu-bar-fill {
    height: 100%; background: var(--gradient); border-radius: 4px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
}

@media(max-width:900px) { .edu-grid { grid-template-columns: repeat(2, 1fr); } }
@media(max-width:500px) { .edu-grid { grid-template-columns: 1fr; max-width: 350px; } }

/* ================================================================
   CONTACT
   ================================================================ */
.contact-grid {
    display: grid; grid-template-columns: 1fr 1.3fr; gap: 60px;
    max-width: 1020px; margin: 0 auto;
}
.contact-left h3 {
    font-size: 28px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.5px;
}
.contact-left > p {
    color: var(--text-2); margin-bottom: 36px; line-height: 1.85; font-size: 15px;
}
.contact-items {}
.contact-row {
    display: flex; align-items: center; gap: 18px; padding: 18px 0;
    border-bottom: 1px solid var(--border); transition: all var(--transition-fast);
}
.contact-row:last-child { border-bottom: none; }
.contact-row:hover { padding-left: 8px; }
.contact-row-icon {
    width: 50px; height: 50px; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); flex-shrink: 0; transition: all var(--transition-fast);
}
.contact-row:hover .contact-row-icon {
    background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3);
}
.contact-row-icon svg { width: 22px; height: 22px; }
.contact-row-text { display: flex; flex-direction: column; gap: 3px; }
.contact-row-label { font-size: 11px; color: var(--text-4); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
.contact-row-val { font-size: 15px; font-weight: 600; color: var(--text-1); }
.contact-row-val a { transition: color var(--transition-fast); }
.contact-row-val a:hover { color: var(--accent); }

.contact-socials { display: flex; gap: 10px; margin-top: 32px; }

/* Contact Form */
.form-card {
    background: var(--bg-card-solid); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px; position: relative; overflow: hidden;
}
.form-card::before {
    content:''; position: absolute; inset: -1px;
    background: var(--gradient-border); border-radius: 24px;
    z-index: -1; opacity: 0.2;
}
.form-inner { display: flex; flex-direction: column; gap: 22px; position: relative; z-index: 1; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label {
    font-size: 13px; font-weight: 600; color: var(--text-2);
    letter-spacing: 0.5px; text-transform: uppercase;
}
.form-input, .form-textarea {
    padding: 16px 20px; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 12px;
    font-family: var(--font); font-size: 15px; color: var(--text-0);
    transition: all var(--transition-fast); outline: none;
}
.form-input:focus, .form-textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59,130,246,0.08);
    background: var(--bg-4);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-4); }
.form-textarea { resize: vertical; min-height: 140px; }

.btn-submit { width: 100%; justify-content: center; font-size: 16px; padding: 16px; }

@media(max-width:768px) {
    .contact-grid { grid-template-columns: 1fr; }
    .form-card { padding: 28px; }
    .form-row { grid-template-columns: 1fr; }
}

/* ================================================================
   FOOTER
   ================================================================ */
.footer {
    background: var(--bg-1); border-top: 1px solid var(--border);
    padding: 64px 0 32px;
}
.footer-top {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 24px; margin-bottom: 40px;
}
.footer-logo { display: flex; align-items: center; gap: 12px; }
.footer-logo .logo-mark { width: 38px; height: 38px; font-size: 14px; border-radius: 10px; }
.footer-logo-text { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }

.footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 28px; }
.footer-nav a {
    color: var(--text-3); font-size: 14px; font-weight: 500;
    transition: all var(--transition-fast); position: relative;
}
.footer-nav a::after {
    content:''; position: absolute; bottom: -4px; left: 0; width: 0;
    height: 1px; background: var(--accent); transition: width var(--transition-fast);
}
.footer-nav a:hover { color: var(--text-1); }
.footer-nav a:hover::after { width: 100%; }

.footer-socials { display: flex; gap: 10px; }
.footer-socials .social-btn { width: 40px; height: 40px; border-radius: 10px; }
.footer-socials .social-btn svg { width: 18px; height: 18px; }

.footer-divider { width: 100%; height: 1px; background: var(--border); }
.footer-bottom {
    display: flex; flex-wrap: wrap; justify-content: center;
    align-items: center; gap: 24px; padding-top: 24px;
}
.footer-copy { color: var(--text-4); font-size: 13px; }
.footer-made {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-4);
}
.footer-made svg { width: 14px; height: 14px; }
.footer-made span { color: var(--accent); font-weight: 600; }
</style>
</head>

/* ================================================================
   SCROLL ANIMATION HOOK
   ================================================================ */
function useAnim(threshold = 0.12) {
    const ref = useRef(null);
    const [vis, setVis] = useState(false);
    useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
            ([e]) => { if (e.isIntersecting) { setVis(true); obs.unobserve(e.target); } },
            { threshold, rootMargin: '0px 0px -40px 0px' }
        );
        obs.observe(el);
        return () => { if (el) obs.unobserve(el); };
    }, [threshold]);
    return [ref, vis];
}

const scrollTo = (id) => document.querySelector(id)?.scrollIntoView({ behavior: 'smooth' });

function Navbar() {
    const [scrolled, setScrolled] = useState(false);
    const [open, setOpen] = useState(false);

    useEffect(() => {
        const h = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
    }, []);

    useEffect(() => {
        document.body.style.overflow = open ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
    }, [open]);

    const links = ['About','Skills','Projects','Experience','Education'];

    return (
        <React.Fragment>
            {open && <div className="nav-overlay show" onClick={() => setOpen(false)} />}
            <nav className={`navbar${scrolled?' scrolled':''}`} role="navigation" aria-label="Main">
                <div className="nav-inner">
                    <a href="#" className="nav-logo" onClick={e=>{e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});}}>
                        <div className="logo-mark">RS</div>

                    </a>
                    <button className={`nav-toggle${open?' on':''}`} onClick={()=>setOpen(!open)} aria-label="Menu" aria-expanded={open}>

    ];
    return (
        <section className="section section-dark" id="education">
            <div className="container">
                <div className="section-header">
                    <div className="section-overline"><span>Academic Background</span></div>
                    <h2 className="section-title">Education</h2>
                    <p className="section-desc">A strong academic foundation supporting technical excellence</p>
                </div>
                <div className="edu-grid">
                    {edu.map((e,i)=>{
                        const [ref,vis]=useAnim();
                        return(
                            <div key={i} ref={ref} className={`edu-card anim ${vis?'v':''}`} style={{transitionDelay:`${i*100}ms`}}>
                                <div className="edu-icon-wrap">{e.icon}</div>
                                <h3 className="edu-degree">{e.deg}</h3>
                                <p className="edu-period">{e.period}</p>
                                <div className="edu-score-wrap">
                                    <span className="edu-score">{e.score}</span>
                                    <span className="edu-pct">%</span>
                                </div>
                                <div className="edu-bar"><div className="edu-bar-fill" style={{width: vis ? `${e.score}%` : '0%'}}/></div>
                            </div>
                        );
                    })}
                </div>
            </div>
        </section>
    );
}


/* ================================================================
   CONTACT
   ================================================================ */
function Contact() {
    const [ref,vis] = useAnim();
    const [form, setForm] = useState({name:'',email:'',subject:'',message:''});
    const [sent, setSent] = useState(false);

    const submit = (e) => {
        e.preventDefault();
        window.location.href = `mailto:raham8978@gmail.com?subject=${encodeURIComponent(form.subject)}&body=${encodeURIComponent(`Name: ${form.name}\nEmail: ${form.email}\n\n${form.message}`)}`;
        setSent(true); setTimeout(()=>setSent(false),4000);
    };

    const info = [
        {icon:<I.MapPin/>,label:'Location',val:'Tirupati, Andhra Pradesh, India'},
        {icon:<I.Phone/>,label:'Phone',val:'+91 8978115263',link:'tel:+918978115263'},
        {icon:<I.Mail/>,label:'Email',val:'raham8978@gmail.com',link:'mailto:raham8978@gmail.com'},
    ];

    return (
        <section className="section" id="contact">
            <div className="container">
                <div className="section-header">
                    <div className="section-overline"><span>Get In Touch</span></div>
                    <h2 className="section-title">Contact</h2>
                    <p className="section-desc">Have a project in mind or want to discuss opportunities? I'd love to hear from you.</p>
                </div>
                <div ref={ref} className={`contact-grid anim ${vis?'v':''}`}>
                    <div className="contact-left">
                        <h3>Let's build something great together</h3>
                        <p>I'm currently open to backend developer roles and exciting collaboration opportunities. Whether it's a full-time position at a product company or a freelance project, let's connect.</p>
                        <div className="contact-items">
                            {info.map((item,i)=>(
                                <div key={i} className="contact-row">
                                    <div className="contact-row-icon">{item.icon}</div>
                                    <div className="contact-row-text">
                                        <span className="contact-row-label">{item.label}</span>
                                        <span className="contact-row-val">{item.link?<a href={item.link}>{item.val}</a>:item.val}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="contact-socials">
                            <a href="https://github.com/Theideal45" target="_blank" rel="noopener noreferrer" className="social-btn" aria-label="GitHub"><I.Github/></a>
                            <a href="https://www.linkedin.com/in/rahamthulla-shaik-ba230535a/" target="_blank" rel="noopener noreferrer" className="social-btn" aria-label="LinkedIn"><I.Linkedin/></a>
                        </div>
                    </div>
                    <div className="form-card">
                        <form className="form-inner" onSubmit={submit}>
                            <div className="form-row">
                                <div className="form-group">
                                    <label className="form-label" htmlFor="c-name">Name</label>
                                    <input id="c-name" className="form-input" placeholder="Your full name" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                                </div>
                                <div className="form-group">
                                    <label className="form-label" htmlFor="c-email">Email</label>
                                    <input id="c-email" type="email" className="form-input" placeholder="you@example.com" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
                                </div>
                            </div>
                            <div className="form-group">
                                <label className="form-label" htmlFor="c-subject">Subject</label>
                                <input id="c-subject" className="form-input" placeholder="Project inquiry or opportunity" required value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})}/>
                            </div>
                            <div className="form-group">
                                <label className="form-label" htmlFor="c-msg">Message</label>
                                <textarea id="c-msg" className="form-textarea" placeholder="Tell me about your project or opportunity..." required value={form.message} onChange={e=>setForm({...form,message:e.target.value})}/>
                            </div>
                            <button type="submit" className="btn btn-primary btn-submit">
                                {sent ? '✓ Opening Mail Client...' : <><I.Send/> Send Message</>}
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    );
}


/* ================================================================
   FOOTER
   ================================================================ */
function Footer() {
    const yr = new Date().getFullYear();
    const links = ['About','Skills','Projects','Experience','Education','Contact'];
    return (
        <footer className="footer">
            <div className="container">
                <div className="footer-top">
                    <div className="footer-logo">
                        <div className="logo-mark" style={{width:38,height:38,fontSize:14,borderRadius:10}}>RS</div>
                        <span className="footer-logo-text">Rahamthulla Shaik</span>
                    </div>
                    <nav aria-label="Footer"><div className="footer-nav">{links.map(l=><a key={l} href={`#${l.toLowerCase()}`} onClick={e=>{e.preventDefault();scrollTo(`#${l.toLowerCase()}`);}}>{l}</a>)}</div></nav>
                    <div className="footer-socials">
                        <a href="https://github.com/Theideal45" target="_blank" rel="noopener noreferrer" className="social-btn" aria-label="GitHub"><I.Github/></a>
                        <a href="https://www.linkedin.com/in/rahamthulla-shaik-ba230535a/" target="_blank" rel="noopener noreferrer" className="social-btn" aria-label="LinkedIn"><I.Linkedin/></a>
                        <a href="mailto:raham8978@gmail.com" className="social-btn" aria-label="Email"><I.Mail/></a>
                    </div>
                </div>
                <div className="footer-divider"/>
                <div className="footer-bottom">
                    <p className="footer-copy">© {yr} Rahamthulla Shaik. All rights reserved.</p>
                    <p className="footer-made">Crafted with <I.Heart/> using <span>React</span> & <span>Modern CSS</span></p>
                </div>
            </div>
        </footer>
    );
}


/* ================================================================
   APP
   ================================================================ */
function App() {
    return (
        <React.Fragment>
            <Navbar/>
            <main>
                <Hero/>
                <About/>
                <Skills/>
                <Projects/>
                <Experience/>
                <Education/>
                <Contact/>
            </main>
            <Footer/>
        </React.Fragment>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
